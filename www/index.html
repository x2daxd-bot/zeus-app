<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ZEUS - عالم الأفلاف والمسلسلات والبث المباشر</title>
    <meta name="description" content="ZEUS - منصة الترفيه الأولى لمشاهدة أحدث الأفلام والمسلسلات العربية والأجنبية، الأنمي، والبث المباشر للمباريات بجودة عالية مجاناً.">
    <meta name="keywords" content="ZEUS, افلام مترجمة, مسلسلات عربية, بث مباشر مباريات, انمي اونلاين, مشاهدة افلام مجانا, زيوس">
    <meta name="author" content="ZEUS Empire">
    
    <meta property="og:title" content="ZEUS - منصة الترفيه المتكاملة">
    <meta property="og:description" content="شاهد أحدث الأفلام والمسلسلات والبث المباشر بجودة عالية مجاناً على ZEUS.">
    <meta property="og:image" content="https://zeus-empire.vercel.app/logo.png"> <meta property="og:url" content="https://zeus-empire.vercel.app/">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ZEUS - شاهد أفلامك المفضلة مجاناً">
    <meta name="twitter:description" content="أكبر مكتبة أفلام ومسلسلات وبث مباشر في تطبيق ويب واحد.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ZEUS",
      "url": "https://zeus-empire.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://zeus-empire.vercel.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splashScreen">
        <div class="splash-logo">ZEUS</div>
        <p style="color: #444; font-size: 12px; margin-top: 10px;">POWERED BY AI</p>
    </div>

    <div class="watermark">ZEUS</div>

    <header class="glass-effect">
        <div class="header-left">
            <i class="fas fa-dice nav-icon" title="اقتراح عشوائي" onclick="playRandomMovie()"></i>
            <i class="fas fa-paint-brush nav-icon" onclick="toggleThemeMenu()"></i>
            <i class="fas fa-cog nav-icon" title="الإعدادات" onclick="openSettingsModal()" style="margin-right: 5px;"></i>
        </div>
        
        <div id="themeMenu" class="theme-menu hidden glass-effect">
            <button onclick="changeTheme('default')">🔴 الأحمر (الافتراضي)</button>
            <button onclick="changeTheme('blue')">🔵 النيون الأزرق</button>
            <button onclick="changeTheme('green')">🟢 الأخضر الفسفوري</button>
            <button onclick="changeTheme('purple')">🟣 البنفسجي الملكي</button>
            <button onclick="changeTheme('gold')">🟡 الذهبي الفاخر</button>
            <button onclick="changeTheme('orange')">🟠 البرتقالي الناري</button>
        </div>
        
        <div class="logo" onclick="goToHome()">ZEUS</div>
    </header>

    <nav class="bottom-nav glass-effect">
        <a href="#" onclick="goToHome()" class="nav-item active"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="#" onclick="toggleSearch()" class="nav-item"><i class="fas fa-search"></i><span>البحث</span></a>
        <a href="#" onclick="toggleFavoritesView()" class="nav-item" id="bottomHeartIcon"><i class="fas fa-heart"></i><span>المفضلة</span></a>
        <a href="#" onclick="scrollToLive()" class="nav-item"><i class="fas fa-tv"></i><span>مباشر</span></a>
        <a href="#" onclick="openLoginModal()" class="nav-item" id="userNavBtn"><i class="fas fa-user"></i><span>دخول</span></a>
    </nav>

    <div id="searchWrapper" class="hidden glass-effect">
        <input
            type="text"
            id="searchInput"
            placeholder="ابحث عن فيلم أو مسلسل..."
            oninput="liveSearch(this.value)"
        >
        <div id="searchResults" class="search-results-grid"></div>
        
        <div id="errorState">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>لا توجد نتائج!</h3>
            <p>يرجى التحقق من الكلمة المدخلة والمحاولة مرة أخرى.</p>
        </div>
    </div>

    <div id="heroSection"></div>

    <div class="quick-filters" id="quickFiltersContainer"></div>

    <div id="continueSection" class="hidden">
        <div class="section-title">استكمال المشاهدة <span style="font-size:11px; font-weight:normal; color:#aaa;">(أحدث الحلقات)</span></div>
        <div class="scroll-row" id="continueRow"></div>
    </div>

    <div id="favoritesSection" class="hidden">
        <div class="section-title">قائمة المفضلة</div>
        <div class="scroll-row" id="favoritesRow"></div>
    </div>

    <div id="sectionsContainer"></div>

    <div id="movieModal" class="modal" onclick="closeMovie()">
        <div class="modal-content glass-effect" id="modalContent" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeMovie()">✖</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content glass-effect" style="max-width: 500px; margin: 40px auto; border-radius:10px; padding: 20px;" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="document.getElementById('settingsModal').style.display='none'">✖</button>
            <div id="settingsModalBody"></div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">تم بنجاح!</span></div>

    <button id="backToTop" class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script src="app.js"></script>

    </body>
</html>
